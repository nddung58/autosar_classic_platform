signals:
  - name: vehicle_speed
    pdu_id: 0x001
    start_bit: 0
    bit_length: 16
    endian: little
    signed: false
    factor: 0.01
    offset: 0
    unit: km/h

  - name: engine_rpm
    pdu_id: 0x002
    start_bit: 16
    bit_length: 16
    endian: little
    signed: false
    factor: 0.25
    offset: 0
    unit: rpm
